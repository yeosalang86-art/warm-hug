<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>따뜻한 포옹</title>

<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Gaegu',cursive;
background:linear-gradient(#fff8fb,#ffeef6);
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

header{
font-size:34px;
padding:20px;
color:#6b4b57;
}

/* home */
#home{
flex:1;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.bearHero{
width:260px;
height:260px;
margin-bottom:10px;
}

button{
background:#ffd6e7;
border:none;
padding:14px 24px;
border-radius:30px;
font-size:18px;
cursor:pointer;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
}

button:hover{transform:scale(1.05)}

/* rooms */
#rooms{display:none;width:90%;max-width:600px}
.room{
background:white;
padding:16px;
border-radius:20px;
margin:12px 0;
box-shadow:0 6px 16px rgba(0,0,0,0.06);
cursor:pointer;
display:flex;
justify-content:space-between;
}

/* chat */
#chat{
display:none;
flex-direction:column;
height:100vh;
width:100%;
max-width:600px;
}

#messages{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
margin:10px 0;
max-width:60%;
padding:12px 16px;
border-radius:20px;
font-size:18px;
}

.left{background:#ffffff;align-self:flex-start}
.right{background:#ffd6e7;align-self:flex-end}

#inputArea{display:flex;padding:10px;background:white}

#inputArea input{
flex:1;border:none;padding:10px;border-radius:20px;background:#f4f4f4;font-family:'Gaegu'
}

/* cute hug popup */
#hugPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

.bear{
width:340px;
animation:hugBounce 1.2s infinite alternate;
}

@keyframes hugBounce{
from{transform:scale(1)}
to{transform:scale(1.08)}
}

.armLeft{
transform-origin:right center;
animation:armL 1.2s infinite alternate
}

.armRight{
transform-origin:left center;
animation:armR 1.2s infinite alternate
}

@keyframes armL{
from{transform:rotate(0deg)}
to{transform:rotate(-18deg)}
}

@keyframes armR{
from{transform:rotate(0deg)}
to{transform:rotate(18deg)}
}

.heart{
position:fixed;
font-size:28px;
animation:float 2s linear forwards
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-160px);opacity:0}
}

#notice{
position:fixed;
bottom:120px;
background:white;
padding:14px 20px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
display:none
}

</style>
</head>

<body>

<header>따뜻한 포옹</header>

<div id="home">

<svg class="bearHero" viewBox="0 0 200 200">

<circle cx="100" cy="100" r="70" fill="#F4B6C2"/>

<circle cx="60" cy="50" r="25" fill="#F4B6C2"/>
<circle cx="140" cy="50" r="25" fill="#F4B6C2"/>

<circle cx="60" cy="50" r="12" fill="#ffdbe5"/>
<circle cx="140" cy="50" r="12" fill="#ffdbe5"/>

<circle cx="75" cy="95" r="6" fill="#333"/>
<circle cx="125" cy="95" r="6" fill="#333"/>

<ellipse cx="100" cy="120" rx="18" ry="12" fill="#fff"/>

<circle cx="100" cy="115" r="4" fill="#333"/>

<path d="M92 124 Q100 132 108 124" stroke="#333" stroke-width="2" fill="none"/>

<rect x="85" y="135" width="30" height="30" rx="15" fill="#F4B6C2"/>

</svg>

<button onclick="enterRooms()">포옹 받으러 들어가기</button>
</div>

<div id="rooms">
<div class="room" onclick="enterRoom('친구방')">친구방 <span>0</span></div>
<div class="room" onclick="enterRoom('엄마방')">엄마방 <span>0</span></div>
<div class="room" onclick="enterRoom('전문가방')">전문가방 <span>0</span></div>
</div>

<div id="chat">
<div id="messages"></div>

<div id="inputArea">
<input id="msg" placeholder="따뜻한 말을 보내보세요">
<button onclick="sendMsg()">보내기</button>
</div>
</div>

<div id="hugPopup">

<svg class="bear" viewBox="0 0 200 200">

<circle cx="100" cy="90" r="55" fill="#F4B6C2"/>

<circle cx="60" cy="45" r="20" fill="#F4B6C2"/>
<circle cx="140" cy="45" r="20" fill="#F4B6C2"/>

<circle cx="75" cy="85" r="5" fill="#333"/>
<circle cx="125" cy="85" r="5" fill="#333"/>

<ellipse cx="100" cy="105" rx="16" ry="10" fill="#fff"/>

<circle cx="100" cy="100" r="4" fill="#333"/>

<path d="M92 110 Q100 118 108 110" stroke="#333" stroke-width="2" fill="none"/>

<ellipse class="armLeft" cx="35" cy="120" rx="26" ry="18" fill="#F4B6C2"/>
<ellipse class="armRight" cx="165" cy="120" rx="26" ry="18" fill="#F4B6C2"/>

</svg>

</div>

<div id="notice"></div>

<audio id="pop" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5e6b5f3b45.mp3"></audio>

<script>

let nickname="사용자"+Math.floor(Math.random()*1000)

function playSound(){document.getElementById("pop").play()}

function enterRooms(){
playSound()
document.getElementById("home").style.display="none"
document.getElementById("rooms").style.display="block"
}

function enterRoom(){
playSound()
document.getElementById("rooms").style.display="none"
document.getElementById("chat").style.display="flex"
showNotice(nickname+"님이 입장했습니다.")
}

function sendMsg(){

let input=document.getElementById("msg")
let text=input.value
if(text=="") return

let msg=document.createElement("div")
msg.className="message right"
msg.innerText=text
messages.appendChild(msg)

input.value=""

hug()

}

function hug(){

let popup=document.getElementById("hugPopup")
popup.style.display="flex"

for(let i=0;i<12;i++){
let heart=document.createElement("div")
heart.className="heart"
heart.innerText="💗"
heart.style.left=Math.random()*100+"%"
heart.style.bottom="0px"

document.body.appendChild(heart)
setTimeout(()=>heart.remove(),2000)
}

setTimeout(()=>popup.style.display="none",1500)

}

function showNotice(text){

let n=document.getElementById("notice")
n.innerText=text
n.style.display="block"

setTimeout(()=>{n.style.display="none"},3000)

}

window.addEventListener("beforeunload",function(){
showNotice(nickname+"님이 나가셨습니다.")
})

</script>

</body>
</html>
