<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="따뜻한 포옹 - 조언 없이 공감만 머무는 익명 감정 쉼터" />
  <meta name="keywords" content="따뜻한 포옹, warmhug, 익명 위로, 감정 기록, 공감 쉼터" />
  <meta name="author" content="warmhug" />
  <meta name="google-site-verification" content="zVJYHhPfKUSfGslL9-qCuyFmVurIM8msktRbQeZrqEY" />
  <title>따뜻한 포옹 | Warmhug</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=MaruBuri:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg-1:#f6efe6;
      --bg-2:#eadccb;
      --bg-3:#dfc5a8;
      --paper:#fffaf4;
      --paper-soft:rgba(255,250,244,.84);
      --paper-line:rgba(255,255,255,.56);
      --brown-1:#5c4131;
      --brown-2:#7a5842;
      --brown-3:#9a7458;
      --accent:#f1d0aa;
      --accent-2:#e8bf8f;
      --accent-3:#f8ebdb;
      --line:rgba(117,82,58,.08);
      --shadow:0 18px 42px rgba(96,67,45,.11);
      --shadow-soft:0 10px 24px rgba(96,67,45,.08);
      --danger:#d88b7c;
      --good:#dcc09c;
    }

    *{ box-sizing:border-box; }
    html, body{ margin:0; min-height:100%; }

    body{
      font-family:"Noto Sans KR", sans-serif;
      color:var(--brown-1);
      background:
        radial-gradient(circle at top left, #fff8ef, transparent 28%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2) 52%, var(--bg-3));
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.13;
      background-image:radial-gradient(rgba(120,84,58,.25) 0.45px, transparent 0.45px);
      background-size:8px 8px;
      mix-blend-mode:multiply;
    }

    a{ color:inherit; text-decoration:none; }

    .frame{
      width:min(1160px, 96vw);
      min-height:95vh;
      margin:2.5vh auto;
      border-radius:36px;
      overflow:hidden;
      position:relative;
      background:linear-gradient(180deg, rgba(255,250,244,.62), rgba(255,246,239,.44));
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.45);
      backdrop-filter: blur(6px);
    }

    .frame::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 88% 12%, rgba(255,218,157,.35), transparent 18%),
        radial-gradient(circle at 12% 12%, rgba(255,250,240,.5), transparent 18%);
    }

    .topLeftButtons{
      position:absolute;
      top:18px;
      left:18px;
      z-index:6;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .leftTopBtn{
      text-align:left;
      min-width:120px;
    }

    .underlinedStrong{
      text-decoration:underline;
      text-decoration-thickness:3px;
      text-underline-offset:4px;
    }

    header{
      text-align:center;
      font-family:"MaruBuri", serif;
      font-size:34px;
      font-weight:700;
      padding:26px 24px 8px;
      position:relative;
      z-index:2;
    }

    .sub{
      text-align:center;
      color:var(--brown-3);
      font-size:16px;
      line-height:1.6;
      padding:0 24px 8px;
      position:relative;
      z-index:2;
    }

    section{ display:none; }
    #home{ display:flex; }

    #home{
      min-height:78vh;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:28px;
      gap:18px;
      position:relative;
      z-index:2;
    }

    .heroBear{
      font-size:120px;
      line-height:1;
      filter:drop-shadow(0 14px 28px rgba(99,69,47,.11));
      animation:idle 3.2s ease-in-out infinite;
    }

    .heroNote{
      max-width:780px;
      background:rgba(255,250,243,.88);
      padding:18px 22px;
      border-radius:999px;
      box-shadow:var(--shadow-soft);
      border:1px solid rgba(255,255,255,.55);
      color:var(--brown-2);
      font-size:18px;
      line-height:1.7;
    }

    .homeButtons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      border:none;
      cursor:pointer;
      font-family:inherit;
      font-size:16px;
      font-weight:700;
      color:var(--brown-1);
      background:linear-gradient(180deg, #f9ddc0, #efc392);
      border-radius:999px;
      padding:13px 22px;
      box-shadow:0 10px 22px rgba(115,79,52,.13), inset 0 1px 0 rgba(255,255,255,.5);
      transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(115,79,52,.17), inset 0 1px 0 rgba(255,255,255,.5);
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
      box-shadow:0 8px 14px rgba(95,60,34,.07);
    }

    .softBtn{
      background:linear-gradient(180deg,#fbefe2,#f3dcc1);
      font-size:15px;
      padding:10px 15px;
    }

    .dangerBtn{
      background:linear-gradient(180deg,#f0c2ba,#de8e7f);
      color:#fffaf5;
    }

    #app{
      min-height:78vh;
      grid-template-columns:320px 1fr;
      position:relative;
      z-index:2;
    }

    .sidePanel{
      padding:18px;
      border-right:1px solid var(--line);
      background:rgba(255,249,241,.38);
      backdrop-filter:blur(8px);
    }

    .panelCard{
      background:linear-gradient(180deg, rgba(255,250,244,.94), rgba(255,246,239,.84));
      border-radius:26px;
      padding:18px;
      box-shadow:var(--shadow-soft);
      border:1px solid var(--paper-line);
      margin-bottom:14px;
    }

    .panelTitle{
      font-family:"MaruBuri", serif;
      font-size:19px;
      font-weight:700;
      margin-bottom:10px;
    }

    .statLine{
      font-size:15px;
      color:var(--brown-3);
      line-height:1.6;
      margin:7px 0;
    }

    .warmCount{
      font-size:31px;
      font-weight:700;
      color:var(--brown-1);
    }

    .emotionList, .characterList{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .emotionChip, .characterChip{
      background:linear-gradient(180deg,#f5e6d3,#efd9be);
      color:var(--brown-2);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.45);
    }

    .mainPanel{
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:78vh;
    }

    .chatTop{
      display:flex;
      align-items:center;
      gap:12px;
      padding:18px;
      border-bottom:1px solid var(--line);
      background:rgba(255,250,243,.38);
      backdrop-filter:blur(6px);
      flex-wrap:wrap;
    }

    .chatBearMini{
      width:58px;
      height:58px;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      background:linear-gradient(180deg,#faf0e4,#f2dbc0);
      box-shadow:var(--shadow-soft);
    }

    .chatTitle{
      font-family:"MaruBuri", serif;
      font-size:24px;
      font-weight:700;
      color:var(--brown-1);
    }

    .chatDesc{
      font-size:15px;
      color:var(--brown-3);
      line-height:1.55;
      margin-top:2px;
    }

    .topAction{
      margin-left:auto;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .characterTabs{
      display:flex;
      gap:10px;
      padding:14px 18px 10px;
      overflow-x:auto;
      scroll-behavior:smooth;
    }

    .characterBtn{
      min-width:max-content;
      border-radius:999px;
      padding:10px 14px;
      background:rgba(255,250,244,.92);
      border:1px solid rgba(255,255,255,.55);
      box-shadow:var(--shadow-soft);
      color:var(--brown-2);
      font-weight:700;
      font-size:14px;
    }

    .characterBtn.active{
      background:linear-gradient(180deg, #f9ddc0, #efc392);
      color:var(--brown-1);
    }

    #messages{
      flex:1;
      overflow-y:auto;
      overflow-x:hidden;
      padding:14px 18px 12px;
      display:flex;
      flex-direction:column;
      gap:13px;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
    }

    .systemMsg{
      align-self:center;
      background:rgba(255,250,243,.92);
      color:var(--brown-3);
      padding:10px 15px;
      border-radius:999px;
      font-size:14px;
      box-shadow:0 8px 18px rgba(0,0,0,.05);
      border:1px solid rgba(255,255,255,.45);
    }

    .msgWrap{
      display:flex;
      flex-direction:column;
      gap:6px;
      max-width:78%;
    }

    .msgWrap.me{
      align-self:flex-end;
      align-items:flex-end;
    }

    .msgWrap.ai{
      align-self:flex-start;
      align-items:flex-start;
    }

    .nick{
      font-size:13px;
      color:var(--brown-3);
      padding:0 8px;
    }

    .msg{
      padding:15px 18px;
      border-radius:24px;
      font-size:16px;
      line-height:1.65;
      box-shadow:0 8px 18px rgba(76,48,28,.07);
      word-break:keep-all;
      white-space:pre-wrap;
      border:1px solid rgba(255,255,255,.42);
    }

    .me .msg{
      background:linear-gradient(180deg,#f7dcc0,#efc79b);
      color:var(--brown-1);
      border-bottom-right-radius:10px;
    }

    .ai .msg{
      background:rgba(255,251,246,.96);
      color:var(--brown-1);
      border-bottom-left-radius:10px;
    }

    .msgMeta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      padding:2px 8px 0;
    }

    .miniBadge{
      background:linear-gradient(180deg,#f5e4d0,#eed7bc);
      color:var(--brown-2);
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
    }

    .hugBar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
      padding:0 8px;
    }

    .hugMini{
      border:none;
      background:rgba(255,249,242,.96);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      color:var(--brown-2);
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,.04);
    }

    .inputArea{
      border-top:1px solid var(--line);
      padding:14px 16px 16px;
      background:rgba(255,250,243,.38);
      backdrop-filter:blur(6px);
    }

    #msg{
      width:100%;
      border:none;
      outline:none;
      background:rgba(255,251,246,.96);
      padding:15px 16px;
      border-radius:22px;
      font-size:16px;
      color:var(--brown-1);
      resize:none;
      min-height:98px;
      max-height:160px;
      font-family:inherit;
      box-shadow:inset 0 2px 8px rgba(0,0,0,.04), 0 4px 12px rgba(95,60,34,.03);
    }

    #msg::placeholder{ color:#b18a6a; }

    .inputBottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    .charCount{
      color:var(--brown-3);
      font-size:14px;
    }

    .inputBtns{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .modalOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(71,49,37,.22);
      backdrop-filter:blur(5px);
      z-index:60;
      padding:16px;
    }

    .modalCard{
      width:min(560px,92vw);
      background:linear-gradient(180deg,#fffaf4,#f8ead8);
      border-radius:32px;
      padding:26px;
      box-shadow:0 20px 60px rgba(0,0,0,.22);
      color:var(--brown-1);
      text-align:center;
      border:1px solid rgba(255,255,255,.5);
    }

    .modalEmoji{
      font-size:88px;
      line-height:1;
      margin-bottom:10px;
      animation:idle 2.2s ease-in-out infinite;
    }

    .modalTitle{
      font-family:"MaruBuri", serif;
      font-size:28px;
      font-weight:700;
      margin-bottom:8px;
    }

    .modalText{
      font-size:17px;
      line-height:1.7;
      color:var(--brown-3);
      white-space:pre-wrap;
    }

    .modalActions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:16px;
    }

    #notice{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:28px;
      background:rgba(255,250,243,.97);
      color:var(--brown-1);
      padding:14px 20px;
      border-radius:18px;
      box-shadow:0 12px 30px rgba(0,0,0,.14);
      border:1px solid rgba(255,255,255,.5);
      display:none;
      z-index:80;
      font-size:15px;
      max-width:min(92vw,580px);
      text-align:center;
    }

    .heart{
      position:fixed;
      font-size:28px;
      animation:float 2s linear forwards;
      z-index:75;
      pointer-events:none;
    }

    @keyframes float{
      0%{ transform:translateY(0) scale(1); opacity:1; }
      100%{ transform:translateY(-160px) scale(1.24); opacity:0; }
    }

    @keyframes idle{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-8px); }
    }

    @media (max-width:980px){
      #app{ grid-template-columns:1fr; }
      .sidePanel{ display:none; }
    }

    @media (max-width:760px){
      .frame{ width:100vw; min-height:100vh; margin:0; border-radius:0; }
      header{ font-size:30px; padding-top:74px; }
      .sub{ font-size:15px; }
      .heroBear{ font-size:96px; }
      .heroNote{ font-size:16px; border-radius:28px; }
      .chatTitle{ font-size:21px; }
      .msgWrap{ max-width:92%; }
      #messages{ min-height:280px; }
      .topLeftButtons{ top:12px; left:12px; }
      .leftTopBtn{ min-width:104px; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="topLeftButtons">
      <button id="menuBtn" class="softBtn leftTopBtn underlinedStrong" type="button">메뉴</button>
      <button id="homeBtn" class="softBtn leftTopBtn" type="button">홈으로</button>
    </div>

    <header>따뜻한 포옹</header>
    <div class="sub">조언 없이, 판단 없이, 공감만 머무는 익명 감정 쉼터</div>

    <section id="home">
      <div class="heroBear">🧸</div>
      <div class="heroNote">
        오늘 마음은 어떤가요?<br />
        여기서는 고치려 하지 않아도 괜찮아요. 그냥 내려놓아도 괜찮아요.
      </div>
      <div class="homeButtons">
        <button id="startBtn" type="button">마음 내려놓기</button>
      </div>
    </section>

    <section id="app">
      <aside class="sidePanel">
        <div class="panelCard">
          <div class="panelTitle">오늘 받은 포옹</div>
          <div class="warmCount" id="todayHugs">0 🫂</div>
          <div class="statLine">이번 주 받은 따뜻함 <strong id="weekWarmth">0 hugs</strong></div>
        </div>

        <div class="panelCard">
          <div class="panelTitle">오늘의 마음</div>
          <div class="statLine" id="emotionSummary">아직 기록이 없어요.</div>
          <div class="emotionList" id="emotionList"></div>
        </div>

        <div class="panelCard">
          <div class="panelTitle">공감 스타일</div>
          <div class="statLine">성격이 아니라, 다정함의 결을 고르는 방식이에요.</div>
          <div class="characterList" id="characterList"></div>
        </div>

        <div class="panelCard">
          <div class="panelTitle">공간의 약속</div>
          <div class="statLine">- 조언하지 않아요</div>
          <div class="statLine">- 판단하지 않아요</div>
          <div class="statLine">- 비교하지 않아요</div>
          <div class="statLine">- 위험 신호는 도움연결을 우선해요</div>
        </div>
      </aside>

      <div class="mainPanel">
        <div class="chatTop">
          <div class="chatBearMini" id="characterEmoji">🍵</div>
          <div>
            <div class="chatTitle" id="characterTitle">둥글레차</div>
            <div class="chatDesc" id="characterDesc">일상에서 지친 마음을 담백하게 안아주는 공감이에요.</div>
          </div>
          <div class="topAction">
            <button id="clearBtn" class="softBtn" type="button">기록 지우기</button>
            <button id="guideBtn" class="softBtn" type="button">도움 연결</button>
          </div>
        </div>

        <div class="characterTabs" id="characterTabs"></div>

        <div id="messages" aria-live="polite"></div>

        <div class="inputArea">
          <textarea id="msg" maxlength="120" placeholder="오늘 마음을 적어보세요..." aria-label="마음 입력"></textarea>
          <div class="inputBottom">
            <div class="charCount"><span id="charCount">0</span> / 120</div>
            <div class="inputBtns">
              <button id="sendBtn" type="button">공감 받기</button>
              <button id="hugMyselfBtn" class="softBtn" type="button">나에게 포옹</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div id="modal" class="modalOverlay" aria-hidden="true">
    <div class="modalCard">
      <div class="modalEmoji" id="modalEmoji">🧸</div>
      <div class="modalTitle" id="modalTitle">따뜻한 반응</div>
      <div class="modalText" id="modalText">여기서는 괜찮아요.</div>
      <div class="modalActions" id="modalActions"></div>
    </div>
  </div>

  <div id="notice" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "warmhug_mvp_v3";

    const characters = {
      둥글레차: {
        emoji: "🍵",
        desc: "일상에서 지친 마음을 담백하게 안아주는 공감이에요.",
        short: "일상 위로형",
        templates: [
          "그랬구나.\n많이 힘들었겠다.",
          "그 마음으로 여기까지 왔구나.\n조금 내려놓아도 괜찮아.",
          "쉽지 않은 하루였겠네.\n여기서는 잠깐 쉬어도 괜찮아.",
          "그렇게 느꼈구나.\n충분히 그럴 수 있어."
        ]
      },
      홍차: {
        emoji: "☕",
        desc: "조금 더 단단하고 또렷하게 마음을 받쳐주는 공감이에요.",
        short: "단단한 공감형",
        templates: [
          "그 일을 겪고도 여기까지 온 거네.\n쉽지 않았겠다.",
          "무너지지 않으려 애쓴 마음이 느껴져.\n정말 애썼어.",
          "그 상황 속에서 버티고 있었구나.\n그것만으로도 충분해.",
          "견디는 동안 많이 지쳤겠다.\n지금은 조금 기대도 괜찮아."
        ]
      },
      캐모마일차: {
        emoji: "🌼",
        desc: "불안하거나 예민한 마음을 천천히 눕혀주는 공감이에요.",
        short: "불안 완화형",
        templates: [
          "지금 마음이 많이 흔들리는 것 같아.\n여기서는 천천히 해도 괜찮아.",
          "긴장된 마음으로 오래 버텼구나.\n조금 숨을 고르고 있어도 괜찮아.",
          "불안한 밤 같은 마음이었겠네.\n지금 이 순간만큼은 조용해져도 괜찮아.",
          "많이 조마조마했겠다.\n여기서는 서두르지 않아도 괜찮아."
        ]
      }
    };

    const hugTypes = [
      { id:"ok", label:"괜찮아질 거예요", emoji:"🤍", popupEmoji:"🧸", message:"괜찮아질 거예요.\n여기서는 잠깐 기대어도 괜찮아요." },
      { id:"pain", label:"많이 아팠죠", emoji:"🫂", popupEmoji:"🫂", message:"많이 아팠죠.\n이제 잠깐 여기서 쉬어요." },
      { id:"hold", label:"잘 버텼어요", emoji:"💛", popupEmoji:"🐻", message:"잘 버텼어요.\n지금까지도 충분히 애써왔어요." }
    ];

    const blockedWords = ["죽어","병신","멍청","꺼져","씨발","시발","좆","강간","살인"];
    const threatWords = ["죽고 싶","자살","살려줘","폭행","성폭행","학대","스토킹","칼","납치","도와줘"];

    const emotionKeywords = {
      불안:["불안","무서","떨려","긴장","초조"],
      슬픔:["슬퍼","눈물","우울","외로","속상"],
      분노:["화나","짜증","억울","분해"],
      지침:["지쳐","버겁","무기력","피곤"],
      위로필요:["위로","안아","포옹","괜찮"],
      관계:["친구","엄마","가족","학교","회사","사람"]
    };

    const home = document.getElementById("home");
    const app = document.getElementById("app");
    const startBtn = document.getElementById("startBtn");
    const guideBtn = document.getElementById("guideBtn");
    const clearBtn = document.getElementById("clearBtn");
    const menuBtn = document.getElementById("menuBtn");
    const homeBtn = document.getElementById("homeBtn");
    const messages = document.getElementById("messages");
    const msgInput = document.getElementById("msg");
    const charCount = document.getElementById("charCount");
    const sendBtn = document.getElementById("sendBtn");
    const hugMyselfBtn = document.getElementById("hugMyselfBtn");
    const todayHugs = document.getElementById("todayHugs");
    const weekWarmth = document.getElementById("weekWarmth");
    const emotionSummary = document.getElementById("emotionSummary");
    const emotionList = document.getElementById("emotionList");
    const characterList = document.getElementById("characterList");
    const characterTabs = document.getElementById("characterTabs");
    const characterEmoji = document.getElementById("characterEmoji");
    const characterTitle = document.getElementById("characterTitle");
    const characterDesc = document.getElementById("characterDesc");
    const modal = document.getElementById("modal");
    const modalEmoji = document.getElementById("modalEmoji");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");
    const modalActions = document.getElementById("modalActions");
    const notice = document.getElementById("notice");

    const state = loadState();
    let currentCharacter = state.currentCharacter || "둥글레차";
    let messageSeq = 1;

    init();

    function defaultState(){
      return {
        stats:{ todayHugs:0, weekWarmth:0 },
        emotions:[],
        entries:[],
        currentCharacter:"둥글레차"
      };
    }

    function loadState(){
      try{
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved){
          const parsed = JSON.parse(saved);
          return {
            ...defaultState(),
            ...parsed,
            stats:{ ...defaultState().stats, ...(parsed.stats || {}) }
          };
        }
      }catch(error){
        console.error(error);
      }
      return defaultState();
    }

    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function init(){
      renderCharacterTabs();
      updateCharacterUI();
      updateStats();
      updateEmotionUI();
      renderMessages();
      showNotice("따뜻한 포옹에 오신 걸 환영해요.");
    }

    function showApp(){
      home.style.display = "none";
      app.style.display = "grid";
      setTimeout(() => msgInput.focus(), 120);
      setTimeout(scrollBottom, 150);
    }

    function goHome(){
      app.style.display = "none";
      home.style.display = "flex";
      window.scrollTo({ top:0, behavior:"smooth" });
    }

    function showNotice(text){
      notice.textContent = text;
      notice.style.display = "block";
      clearTimeout(showNotice.timer);
      showNotice.timer = setTimeout(() => {
        notice.style.display = "none";
      }, 2400);
    }

    function updateStats(){
      todayHugs.textContent = `${state.stats.todayHugs} 🫂`;
      weekWarmth.textContent = `${state.stats.weekWarmth} hugs`;
    }

    function updateEmotionUI(){
      emotionList.innerHTML = "";
      if(!state.emotions.length){
        emotionSummary.textContent = "아직 기록이 없어요.";
        return;
      }
      emotionSummary.textContent = `오늘의 마음: ${state.emotions[0]}`;
      const uniq = [...new Set(state.emotions)].slice(0, 6);
      uniq.forEach(emotion => {
        const chip = document.createElement("div");
        chip.className = "emotionChip";
        chip.textContent = emotion;
        emotionList.appendChild(chip);
      });
    }

    function renderCharacterTabs(){
      characterTabs.innerHTML = "";
      characterList.innerHTML = "";

      Object.entries(characters).forEach(([name, info]) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `characterBtn ${name === currentCharacter ? "active" : ""}`;
        btn.textContent = `${info.emoji} ${name}`;
        btn.addEventListener("click", () => selectCharacter(name));
        characterTabs.appendChild(btn);

        const chip = document.createElement("div");
        chip.className = "characterChip";
        chip.textContent = `${info.emoji} ${name} · ${info.short}`;
        characterList.appendChild(chip);
      });
    }

    function selectCharacter(name){
      currentCharacter = name;
      state.currentCharacter = name;
      saveState();
      updateCharacterUI();
      renderCharacterTabs();
      addSystemMessage(`${name}의 다정함이 곁에 머물렀어요.`);
    }

    function updateCharacterUI(){
      const info = characters[currentCharacter];
      characterEmoji.textContent = info.emoji;
      characterTitle.textContent = currentCharacter;
      characterDesc.textContent = info.desc;
    }

    function renderMessages(){
      messages.innerHTML = "";
      if(!state.entries.length){
        addSystemMessage("여기서는 고치려 하지 않아도 괜찮아요. 그냥 적어도 괜찮아요.", false);
        return;
      }

      state.entries.forEach(item => {
        if(item.type === "system"){
          appendSystemElement(item.text);
          return;
        }
        appendMessageElement(item);
      });
      scrollBottom();
    }

    function addSystemMessage(text, save = true){
      appendSystemElement(text);
      if(save){
        state.entries.push({ type:"system", text });
        saveState();
      }
      scrollBottom();
    }

    function appendSystemElement(text){
      const el = document.createElement("div");
      el.className = "systemMsg";
      el.textContent = text;
      messages.appendChild(el);
    }

    function appendMessageElement(item){
      const wrap = document.createElement("div");
      wrap.className = `msgWrap ${item.who}`;

      const nick = document.createElement("div");
      nick.className = "nick";
      nick.textContent = item.nick;

      const msg = document.createElement("div");
      msg.className = "msg";
      msg.textContent = item.text;

      wrap.appendChild(nick);
      wrap.appendChild(msg);

      if(item.who === "ai" && item.hugBar){
        const hugBar = document.createElement("div");
        hugBar.className = "hugBar";

        hugTypes.forEach(type => {
          const btn = document.createElement("button");
          btn.className = "hugMini";
          btn.type = "button";
          btn.textContent = `${type.emoji} ${type.label}`;
          btn.addEventListener("click", () => openHugPopup(type));
          hugBar.appendChild(btn);
        });

        wrap.appendChild(hugBar);
      }

      if(item.meta){
        const meta = document.createElement("div");
        meta.className = "msgMeta";
        item.meta.forEach(text => {
          const chip = document.createElement("div");
          chip.className = "miniBadge";
          chip.textContent = text;
          meta.appendChild(chip);
        });
        wrap.appendChild(meta);
      }

      messages.appendChild(wrap);
    }

    function addEntry(item){
      state.entries.push(item);
      saveState();
      renderMessages();
    }

    function scrollBottom(){
      messages.scrollTop = messages.scrollHeight;
    }

    function updateCharCount(){
      charCount.textContent = msgInput.value.length;
    }

    function containsBlockedContent(text){
      return blockedWords.some(word => text.includes(word));
    }

    function containsThreatContent(text){
      return threatWords.some(word => text.includes(word));
    }

    function detectEmotion(text){
      for(const [label, keywords] of Object.entries(emotionKeywords)){
        if(keywords.some(word => text.includes(word))){
          return label;
        }
      }
      return "흔들림";
    }

    function createEmpathy(text){
      const info = characters[currentCharacter];
      const base = info.templates[Math.floor(Math.random() * info.templates.length)];

      if(text.includes("외로")) return `${base}\n외로운 마음이었겠구나.`;
      if(text.includes("속상")) return `${base}\n그 마음이 아직 남아 있겠네.`;
      if(text.includes("불안") || text.includes("무서")) return `${base}\n지금은 서두르지 않아도 괜찮아.`;
      if(text.includes("지쳐") || text.includes("피곤")) return `${base}\n많이 소모된 하루였겠다.`;

      return base;
    }

    function openHugPopup(hugType){
      state.stats.todayHugs += 1;
      state.stats.weekWarmth += 1;
      saveState();
      updateStats();
      burstHearts(8);

      showModal({
        emoji:hugType.popupEmoji,
        title:"따뜻한 반응",
        text:hugType.message,
        actions:[
          { label:"고마워요", onClick:() => showNotice("따뜻함이 전해졌어요.") }
        ]
      });
    }

    function showModal({ emoji="🧸", title="따뜻한 반응", text="여기서는 괜찮아요.", actions=[] }){
      modalEmoji.textContent = emoji;
      modalTitle.textContent = title;
      modalText.textContent = text;
      modalActions.innerHTML = "";

      if(actions.length){
        actions.forEach(action => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = action.label;
          if(action.className) btn.className = action.className;
          btn.addEventListener("click", () => {
            if(action.onClick) action.onClick();
            closeModal();
          });
          modalActions.appendChild(btn);
        });
      }else{
        const ok = document.createElement("button");
        ok.type = "button";
        ok.textContent = "닫기";
        ok.addEventListener("click", closeModal);
        modalActions.appendChild(ok);
      }

      modal.style.display = "flex";
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal(){
      modal.style.display = "none";
      modal.setAttribute("aria-hidden", "true");
    }

    function showHelpGuide(){
      showModal({
        emoji:"🆘",
        title:"도움 연결",
        text:"필요한 기관을 골라 바로 이동할 수 있어요.",
        actions:[
          { label:"1366 홈페이지", className:"softBtn", onClick:() => window.open("https://www.women1366.kr/", "_blank") },
          { label:"117 홈페이지", className:"softBtn", onClick:() => window.open("https://www.safe182.go.kr/", "_blank") },
          { label:"112 바로가기", className:"softBtn", onClick:() => window.open("https://www.112.go.kr/", "_blank") },
          { label:"119 바로가기", className:"softBtn", onClick:() => window.open("https://www.119.go.kr/", "_blank") }
        ]
      });
    }

    function createHeart(){
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = ["🤎","💛","🧡","🤍","🫂"][Math.floor(Math.random() * 5)];
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = (window.innerHeight - 120 - Math.random() * 120) + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 2000);
    }

    function burstHearts(count=7){
      for(let i = 0; i < count; i++){
        setTimeout(createHeart, i * 120);
      }
    }

    function handleSend(){
      const text = msgInput.value.trim();
      if(!text) return;

      if(containsBlockedContent(text)){
        showModal({
          emoji:"🐿️",
          title:"조금 더 따뜻하게 말해볼까요?",
          text:"이 공간은 상처 주는 말을 쉬게 하는 곳이에요.",
          actions:[
            { label:"다시 작성하기", onClick:() => msgInput.focus() }
          ]
        });
        return;
      }

      const emotion = detectEmotion(text);
      state.emotions.unshift(emotion);
      state.emotions = state.emotions.slice(0, 12);

      addEntry({
        id:"m_" + Date.now(),
        who:"me",
        nick:"나",
        text,
        meta:[`감정: ${emotion}`, `${messageSeq++}번째 기록`]
      });

      const empathy = createEmpathy(text);
      addEntry({
        id:"a_" + Date.now(),
        who:"ai",
        nick:currentCharacter,
        text:empathy,
        hugBar:true,
        meta:[characters[currentCharacter].short]
      });

      saveState();
      updateStats();
      updateEmotionUI();
      burstHearts(5);

      if(containsThreatContent(text)){
        setTimeout(() => {
          showModal({
            emoji:"🆘",
            title:"도움이 먼저 필요해 보여요",
            text:"혼자 감당하기 어려운 상황처럼 보여요.\n지금은 전문기관 연결을 먼저 생각해보면 좋겠어요.",
            actions:[
              { label:"도움 연결 열기", className:"softBtn", onClick:showHelpGuide },
              { label:"닫기", className:"softBtn", onClick:() => {} }
            ]
          });
        }, 500);
      }

      msgInput.value = "";
      updateCharCount();
      setTimeout(scrollBottom, 80);
    }

    function clearAllEntries(){
      state.entries = [];
      saveState();
      renderMessages();
      showNotice("기록을 지웠어요.");
    }

    function showMenuGuide(){
      showModal({
        emoji:"📚",
        title:"메뉴 안내",
        text:"왼쪽 위 버튼으로 언제든 홈으로 돌아가거나, 현재 화면에서 기록을 이어갈 수 있어요.",
        actions:[
          { label:"확인", className:"softBtn", onClick:() => {} }
        ]
      });
    }

    startBtn.addEventListener("click", showApp);
    guideBtn.addEventListener("click", showHelpGuide);
    clearBtn.addEventListener("click", clearAllEntries);
    menuBtn.addEventListener("click", showMenuGuide);
    homeBtn.addEventListener("click", goHome);
    sendBtn.addEventListener("click", handleSend);

    msgInput.addEventListener("input", () => {
      updateCharCount();
      setTimeout(scrollBottom, 80);
    });

    msgInput.addEventListener("focus", () => {
      setTimeout(scrollBottom, 240);
    });

    msgInput.addEventListener("click", () => {
      setTimeout(scrollBottom, 240);
    });

    msgInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        handleSend();
      }
    });

    hugMyselfBtn.addEventListener("click", () => {
      state.stats.todayHugs += 1;
      state.stats.weekWarmth += 1;
      saveState();
      updateStats();
      burstHearts(8);
      showModal({
        emoji:"🫂",
        title:"나에게도 포옹",
        text:"오늘의 나도 안아줄게요.\n정말 애썼어요.",
        actions:[
          { label:"고마워요", onClick:() => showNotice("오늘의 나를 다정하게 안아주었어요.") }
        ]
      });
    });

    modal.addEventListener("click", (e) => {
      if(e.target === modal) closeModal();
    });
  </script>
</body>
</html>
