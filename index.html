<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>따뜻한 포옹</title>

<style>
body{
margin:0;
font-family:"Noto Sans KR", sans-serif;
background:linear-gradient(180deg,#fff6f7,#fffdf7);
display:flex;
justify-content:center;
}

#app{
max-width:820px;
width:100%;
padding:40px 20px;
}

h1{
text-align:center;
font-size:32px;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:35px;
}

.roomContainer{
display:flex;
flex-direction:column;
gap:18px;
}

.room{
background:white;
border-radius:20px;
padding:22px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
transition:transform .15s ease;
}

.room:hover{
transform:translateY(-3px);
}

.roomName{
font-size:18px;
}

.roomCount{
font-size:14px;
color:#888;
margin-top:4px;
}

.enterBtn{
background:#ffd9e4;
border:none;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
font-size:14px;
}

.enterBtn:hover{
background:#ffc6d6;
}

/* 채팅 영역 */
#chatArea{
margin-top:30px;
display:none;
}

.chatBox{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.chatMessages{
max-height:220px;
overflow:auto;
margin-bottom:15px;
}

.msg{
background:#fff1f5;
padding:10px 14px;
border-radius:14px;
margin-bottom:10px;
max-width:70%;
}

.msg.me{
background:#e8f7ff;
margin-left:auto;
}

textarea{
width:100%;
height:80px;
border-radius:12px;
border:1px solid #eee;
padding:10px;
font-size:14px;
}

.sendBtn{
margin-top:8px;
background:#ffe2ea;
border:none;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
}

.emojiBar{
margin-top:10px;
}

.emoji{
font-size:26px;
margin-right:6px;
cursor:pointer;
}

/* 포옹 팝업 */
#hugPopup{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.35);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.hugBear{
font-size:320px;
animation:hugMotion 1.4s ease-in-out infinite;
}

@keyframes hugMotion{
0%{transform:scale(0.9) rotate(-2deg)}
50%{transform:scale(1.05) rotate(2deg)}
100%{transform:scale(0.9) rotate(-2deg)}
}

.hugText{
background:white;
padding:18px 24px;
border-radius:20px;
font-size:18px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

/* 하트 애니메이션 */
.heart{
position:absolute;
font-size:28px;
animation:float 2.2s ease-out forwards;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-150px);opacity:0}
}

</style>
</head>

<body>

<div id="app">

<h1>따뜻한 포옹</h1>
<div class="subtitle">지금 잠깐, 마음을 쉬어가도 괜찮아요</div>

<div class="roomContainer">

<div class="room">
<div>
<div class="roomName">친구 방</div>
<div class="roomCount" id="friendsCount">0명 들어와 있어요</div>
</div>
<button class="enterBtn" onclick="enterRoom('friends')">들어가기</button>
</div>

<div class="room">
<div>
<div class="roomName">엄마 방</div>
<div class="roomCount" id="momCount">0명 들어와 있어요</div>
</div>
<button class="enterBtn" onclick="enterRoom('mom')">들어가기</button>
</div>

<div class="room">
<div>
<div class="roomName">전문가 방</div>
<div class="roomCount" id="proCount">0명 들어와 있어요</div>
</div>
<button class="enterBtn" onclick="enterRoom('pro')">들어가기</button>
</div>

</div>

<div id="chatArea">

<div class="chatBox">

<div class="chatMessages" id="chat"></div>

<textarea id="text" placeholder="마음을 짧게 적어보세요"></textarea>

<button class="sendBtn" onclick="sendMsg()">보내기</button>

<div class="emojiBar">
<span class="emoji" onclick="sendEmoji('🫂')">🫂</span>
<span class="emoji" onclick="sendEmoji('💗')">💗</span>
<span class="emoji" onclick="sendEmoji('🌼')">🌼</span>
<span class="emoji" onclick="sendEmoji('🤍')">🤍</span>
</div>

</div>

</div>

</div>

<div id="hugPopup">
<div class="hugText" id="hugText"></div>
<div class="hugBear">🧸</div>
</div>

<script>

let counts={
friends:0,
mom:0,
pro:0
}

function enterRoom(room){

counts[room]++

updateCounts()

document.getElementById("chatArea").style.display="block"

showHug()

}

function updateCounts(){

document.getElementById("friendsCount").innerText=counts.friends+"명 들어와 있어요"

document.getElementById("momCount").innerText=counts.mom+"명 들어와 있어요"

document.getElementById("proCount").innerText=counts.pro+"명 들어와 있어요"

}

function sendMsg(){

let t=document.getElementById("text")
if(t.value.trim()=="") return

let div=document.createElement("div")
div.className="msg me"
div.innerText=t.value

chat.appendChild(div)

t.value=""

}

function sendEmoji(e){

let div=document.createElement("div")
div.className="msg"
div.innerText=e

chat.appendChild(div)

}

const messages=[
"괜찮아요. 여기서는 편히 쉬어도 돼요.",
"오늘도 정말 잘 버텼어요.",
"잠깐 안아줄게요.",
"조금만 쉬어가도 괜찮아요.",
"당신은 충분히 잘하고 있어요."
]

function showHug(){

let popup=document.getElementById("hugPopup")
let text=document.getElementById("hugText")

let random=messages[Math.floor(Math.random()*messages.length)]

text.innerText=random

popup.style.display="flex"

spawnHearts()

setTimeout(()=>{
popup.style.display="none"
},3500)

}

function spawnHearts(){

for(let i=0;i<10;i++){

let h=document.createElement("div")
h.className="heart"
h.innerText="💗"

h.style.left=Math.random()*100+"vw"
h.style.top=(60+Math.random()*20)+"vh"


document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

}

}

</script>

</body>
</html>
